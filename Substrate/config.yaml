# Substrate Example Configuration
# Copy this file to ~/.opencode/skills/Substrate/config.yaml and customize.
#
# This template demonstrates all available configuration options with
# sensible defaults and explanatory comments.

substrate:
  # ── Storage ──────────────────────────────────────────────────
  # Root directory where all substrate information groups live.
  base_path: "~/Nextcloud/Documents/substrates"

  # ── Naming ───────────────────────────────────────────────────
  # Controls how component codes are formatted.
  #   "numeric"       → PR-00001
  #   "slug"          → PR-climate-change
  #   "numeric-slug"  → PR-00001-climate-change  (recommended)
  naming: "numeric-slug"

  # ── Automation ───────────────────────────────────────────────
  # Automatically link new components to existing ones based on
  # semantic similarity and shared tags.
  auto_connect: true

  # When a component references another that doesn't exist yet,
  # create a stub placeholder instead of failing.
  auto_create_stubs: true

  # Maximum research depth for the Expand workflow. Prevents
  # runaway exploration. 1 = shallow, 3 = moderate, 5 = deep.
  expand_max_depth: 3

  # ── Default Substrate ────────────────────────────────────────
  # When no substrate is specified, use this one.
  default_substrate: "general"

  # ── Skill Integration ────────────────────────────────────────
  use_fabric_patterns: true
  use_research_skill: true
  use_parser_skill: true

  # ── Appearance ───────────────────────────────────────────────
  # Template detail level for generated component files.
  template_style: "detailed"  # "minimal" or "detailed"

  # ── Per-Type Verification Levels ─────────────────────────────
  # Each component type has its own verification strictness.
  #
  # Levels:
  #   "strict"    — Source URL required. No source = component rejected.
  #   "moderate"  — Source strongly recommended. Missing source flagged but accepted.
  #   "relaxed"   — Source optional. Component accepted without attribution.
  #
  # Design rationale:
  #   Evidence (FA) and external constraints (LA) must always be traceable
  #   to their origin. Claims and Arguments may emerge from reasoning and
  #   benefit from sources but don't strictly require them. Ideas and
  #   Values are inherently subjective — relaxed is appropriate.

  verification:
    # ── Evidence & Constraint Types (always strict) ────────────
    # These form the foundation of trust in the substrate. Without
    # verified sources, the entire knowledge graph loses credibility.
    facts: "strict"
    data_sources: "strict"
    laws: "strict"
    votes: "strict"
    funding_sources: "strict"

    # ── Challenge-Response Types (moderate) ────────────────────
    # Problems, Solutions, Plans, and Goals benefit from sources
    # but may describe emergent situations without a single origin.
    problems: "moderate"
    solutions: "moderate"
    plans: "moderate"
    goals: "moderate"

    # ── Epistemic Types (relaxed to moderate) ──────────────────
    # Claims are assertions that may be speculative. Arguments
    # are reasoning chains that should cite their premises.
    claims: "relaxed"
    arguments: "moderate"

    # ── Conceptual Types (relaxed to moderate) ─────────────────
    # Ideas are inherently speculative. Models and Frames are
    # intellectual constructs that may be original.
    ideas: "relaxed"
    models: "moderate"
    frames: "relaxed"
    values: "relaxed"

    # ── Entity Types (moderate) ────────────────────────────────
    # People, Organizations, Projects, and Events should have at
    # least one reference for identification, but the bar is lower
    # than for factual claims.
    people: "moderate"
    organizations: "moderate"
    projects: "moderate"
    events: "moderate"

  # ── Per-Substrate Overrides ──────────────────────────────────
  # Override the global verification levels for specific substrates.
  # Useful when a substrate's domain demands different rigor.
  #
  # Uncomment and customize as needed:
  #
  # substrate_overrides:
  #   # Legal/compliance substrate — everything must be cited
  #   substrate-legal-compliance:
  #     default_level: "strict"
  #     # Or override individual types:
  #     overrides:
  #       claims: "strict"
  #       arguments: "strict"
  #
  #   # Brainstorming substrate — low friction, high creativity
  #   substrate-brainstorm:
  #     default_level: "relaxed"
  #
  #   # Scientific research substrate — evidence is paramount
  #   substrate-scientific-research:
  #     default_level: "strict"
  #     overrides:
  #       ideas: "moderate"   # hypotheses need some grounding
  #       claims: "strict"    # must be testable and sourced

  # ── Maintain Audit Settings ──────────────────────────────────
  # Controls how the Maintain workflow flags verification issues.
  maintain:
    # Report components missing sources grouped by severity
    report_by_severity: true

    # Auto-fix: add "source-needed" tag to components missing sources
    auto_tag_missing_sources: true

    # Maximum age (in days) before a component is considered stale
    stale_threshold_days: 90

    # Check for broken cross-references during audit
    check_broken_references: true

    # Check for orphan components (no connections) during audit
    check_orphans: true

    # Specify replacement mode for the maintainSubstrate.ts task; "auto" or "suggest"
    fix_mode: "auto"


  # ── Dedup Check Settings ─────────────────────────────────────
  # Controls how the DedupCheck workflow detects and handles
  # potential duplicate components before creation.
  dedup:
    # Enable/disable dedup checking (default: true)
    enabled: true

    # Title similarity threshold for automatic merge (0.0-1.0)
    # Matches at or above this threshold are merged without prompting
    auto_merge_threshold: 0.85

    # Title similarity threshold for prompting user (0.0-1.0)
    # Matches between prompt_threshold and auto_merge_threshold prompt the user
    prompt_threshold: 0.70

    # Tag overlap threshold for medium-confidence matching (0.0-1.0)
    tag_overlap_threshold: 0.50

    # Enable cross-type dedup checks (slower but more thorough)
    cross_type_check: true

    # Log all dedup actions to dedup-log.json
    log_actions: true
